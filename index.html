<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Review Bot</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --text: #e6edf3; --muted: #8b949e;
      --accent: #238636; --accent-hover: #2ea043;
      --danger: #da3633; --warn: #d29922; --info: #388bfd; --purple: #a371f7;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-sans: 'Inter', system-ui, sans-serif;
      --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; background: var(--surface); }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; }
    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #238636, #388bfd); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .badge { font-size: 11px; background: #1f3d2e; color: #3fb950; border: 1px solid #238636; border-radius: 20px; padding: 2px 8px; font-weight: 500; }
    .main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; height: calc(100vh - 57px); }
    .panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
    .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); flex-shrink: 0; }
    .panel-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px; }
    textarea { width: 100%; height: 100%; background: transparent; border: none; outline: none; resize: none; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6; color: var(--text); }
    textarea::placeholder { color: var(--muted); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent-hover); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .settings-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--bg); flex-wrap: wrap; }
    input[type="password"], select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 12px; padding: 5px 10px; font-family: var(--font-mono); outline: none; }
    input[type="password"] { width: 200px; }
    input:focus, select:focus { border-color: var(--info); }
    .spacer { flex: 1; }
    .results-panel { overflow: hidden; display: flex; flex-direction: column; }
    .results-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); text-align: center; padding: 48px; }
    .empty-icon { width: 48px; height: 48px; border: 2px dashed var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .review-section { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .section-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; cursor: pointer; user-select: none; }
    .section-header:hover { background: var(--surface2); }
    .section-bugs { border-color: #da3633; } .section-bugs .section-header { background: #1a0c0c; color: #ff7b72; }
    .section-style { border-color: #d29922; } .section-style .section-header { background: #1a1300; color: #e3b341; }
    .section-suggestions { border-color: #388bfd; } .section-suggestions .section-header { background: #0d1f40; color: #79c0ff; }
    .section-security { border-color: #a371f7; } .section-security .section-header { background: #1a0f30; color: #d2a8ff; }
    .section-summary { border-color: #238636; } .section-summary .section-header { background: #0a1f0f; color: #3fb950; }
    .issue-item { padding: 10px 14px; border-top: 1px solid var(--border); font-size: 12.5px; line-height: 1.6; }
    .issue-line { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .issue-desc { color: var(--text); }
    .issue-fix { margin-top: 6px; padding: 6px 10px; background: var(--surface2); border-radius: 4px; font-family: var(--font-mono); font-size: 11px; color: #3fb950; white-space: pre-wrap; }
    .count-badge { margin-left: auto; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 1px 7px; font-size: 11px; }
    .chevron { transition: transform 0.2s; }
    .collapsed .chevron { transform: rotate(-90deg); }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .score-bar { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
    .score-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .model-tag { font-size: 11px; color: var(--muted); margin-left: auto; }
    @media (max-width: 768px) { .main { grid-template-columns: 1fr; height: auto; } .panel { border-right: none; border-bottom: 1px solid var(--border); min-height: 300px; } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">🔍</div>PR Review Bot</div>
  <div class="badge">AI-powered · Python</div>
  <div class="model-tag">claude-sonnet-4-20250514</div>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">📄 PR Diff Input</div>
      <button class="btn btn-ghost" id="loadExample" style="font-size:11px;padding:4px 10px;">Load example</button>
    </div>
    <div class="settings-bar">
      <input type="password" id="apiKey" placeholder="sk-ant-... API key" />
      <select id="reviewType">
        <option value="full">Full review</option>
        <option value="bugs">Bugs only</option>
        <option value="security">Security focus</option>
        <option value="style">Style only</option>
      </select>
      <div class="spacer"></div>
      <div class="spinner" id="spinner"></div>
      <button class="btn btn-primary" id="reviewBtn">🔍 Analyze PR</button>
    </div>
    <div class="panel-body" style="padding:0;">
      <textarea id="diffInput" placeholder="Paste your git diff here...

diff --git a/src/auth.py b/src/auth.py
--- a/src/auth.py
+++ b/src/auth.py
@@ -5,7 +5,7 @@
-def login(user, pwd):
-    query = f&quot;SELECT * FROM users WHERE user='{user}'&quot;
+def login(user: str, pwd: str) -> dict:
+    query = &quot;SELECT * FROM users WHERE user = %s&quot;
     ..."></textarea>
    </div>
  </div>

  <div class="results-panel">
    <div class="panel-header">
      <div class="panel-title">✨ Review Results</div>
      <button class="btn btn-ghost" id="copyBtn" style="font-size:11px;padding:4px 10px;display:none;">Copy JSON</button>
    </div>
    <div class="results-body" id="resultsBody">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p style="font-weight:500;margin-bottom:4px;">Paste a PR diff and click Analyze</p>
        <p style="font-size:12px;">Supports unified diff format from <code>git diff</code>, GitHub, or GitLab</p>
      </div>
    </div>
  </div>
</div>

<script>
const EXAMPLE = `diff --git a/src/auth.py b/src/auth.py
index 4b3a1c..8f2d9e 100644
--- a/src/auth.py
+++ b/src/auth.py
@@ -1,18 +1,22 @@
+import bcrypt
 import sqlite3
 
-def login(username, password):
-    query = f"SELECT * FROM users WHERE username='{username}'"
-    user = db.execute(query).fetchone()
-    if user and user['password'] == password:
-        token = str(random.random())
-        return {"success": True, "token": token}
+def login(username: str, password: str) -> dict:
+    try:
+        user = db.execute(
+            "SELECT * FROM users WHERE username = ?", (username,)
+        ).fetchone()
+        if user and bcrypt.checkpw(password.encode(), user["password_hash"]):
+            token = secrets.token_hex(32)
+            return {"success": True, "token": token}
+        return {"success": False, "error": "Invalid credentials"}, 401
+    except Exception as e:
+        print(e)
 
diff --git a/src/api.py b/src/api.py
--- a/src/api.py
+++ b/src/api.py
@@ -8,6 +8,12 @@
 @app.route('/users/<int:user_id>')
 def get_user(user_id):
-    data = cache.get(user_id)
-    return data
+    data = cache.get(user_id) or fetch_user(user_id)
+    if not data:
+        return {"error": "Not found"}, 404
+    return jsonify(data)
+
+@app.route('/users/<int:user_id>', methods=['DELETE'])
+def delete_user(user_id):
+    db.execute("DELETE FROM users WHERE id = ?", (user_id,))
+    return "deleted"`;

let lastResult = null;
document.getElementById('loadExample').onclick = () => document.getElementById('diffInput').value = EXAMPLE;
document.getElementById('reviewBtn').onclick = runReview;
document.getElementById('copyBtn').onclick = () => {
  if (lastResult) { navigator.clipboard.writeText(JSON.stringify(lastResult, null, 2)); document.getElementById('copyBtn').textContent = 'Copied!'; setTimeout(() => document.getElementById('copyBtn').textContent = 'Copy JSON', 1500); }
};

async function runReview() {
  const diff = document.getElementById('diffInput').value.trim();
  if (!diff) { alert('Please paste a PR diff first.'); return; }
  const btn = document.getElementById('reviewBtn');
  const spinner = document.getElementById('spinner');
  btn.disabled = true; spinner.style.display = 'block';
  const body = document.getElementById('resultsBody');
  body.innerHTML = `<div class="empty-state"><div class="spinner" style="display:block;width:32px;height:32px;border-width:3px;"></div><p style="margin-top:12px;color:var(--muted)">Analyzing diff with Claude...</p></div>`;
  const reviewType = document.getElementById('reviewType').value;
  const focusNote = reviewType !== 'full' ? `\nFocus primarily on: ${reviewType} issues.` : '';
  const systemPrompt = `You are an expert code reviewer. Analyze the provided git diff and return ONLY a valid JSON object:\n{"summary":"...","score":75,"bugs":[{"line":"file:N","description":"...","fix":"...","severity":"high|medium|low"}],"security":[...],"style":[...],"suggestions":[...]}\nscore is 0-100. Return ONLY JSON, no markdown.${focusNote}`;
  try {
    const apiKey = document.getElementById('apiKey').value.trim();
    const headers = { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' };
    if (apiKey) headers['x-api-key'] = apiKey;
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers,
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 2000, system: systemPrompt, messages: [{ role: 'user', content: `Review this PR diff:\n\n${diff}` }] })
    });
    if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e.error?.message || `HTTP ${resp.status}`); }
    const data = await resp.json();
    const text = data.content.map(b => b.text || '').join('');
    const result = JSON.parse(text.replace(/```json|```/g, '').trim());
    lastResult = result; renderResults(result);
    document.getElementById('copyBtn').style.display = '';
  } catch(err) {
    body.innerHTML = `<div class="review-section section-bugs"><div class="section-header">Error</div><div class="issue-item"><div class="issue-desc">${err.message}</div></div></div>`;
  } finally { btn.disabled = false; spinner.style.display = 'none'; }
}

function renderResults(r) {
  const body = document.getElementById('resultsBody');
  body.innerHTML = '';
  const score = r.score || 0;
  const scoreColor = score >= 80 ? '#3fb950' : score >= 60 ? '#e3b341' : '#ff7b72';
  const scoreEl = document.createElement('div');
  scoreEl.className = 'review-section section-summary';
  scoreEl.innerHTML = `<div class="section-header">📋 Summary</div>
    <div class="score-bar"><span style="font-size:12px;color:var(--muted);min-width:50px;">Quality</span>
    <div class="score-track"><div class="score-fill" style="width:${score}%;background:${scoreColor}"></div></div>
    <span style="font-size:13px;font-weight:600;color:${scoreColor}">${score}</span></div>
    <div class="issue-item" style="border-top:1px solid var(--border)"><div class="issue-desc">${r.summary || ''}</div></div>`;
  body.appendChild(scoreEl);

  [['bugs','🐛 Bugs','section-bugs'],['security','🔒 Security','section-security'],['style','🎨 Style','section-style'],['suggestions','💡 Suggestions','section-suggestions']].forEach(([key,label,cls]) => {
    const items = r[key] || [];
    const sec = document.createElement('div');
    sec.className = `review-section ${cls}`;
    sec.innerHTML = `<div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span>${label}</span><span class="count-badge">${items.length}</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/></svg></div>
      <div>${items.length === 0 ? '<div class="issue-item" style="color:var(--muted)">No issues found ✓</div>' :
        items.map(i => `<div class="issue-item">${i.line ? `<div class="issue-line">📍 ${i.line}</div>` : ''}<div class="issue-desc">${i.description}</div>${i.fix ? `<pre class="issue-fix">${i.fix}</pre>` : ''}</div>`).join('')
      }</div>`;
    body.appendChild(sec);
  });
}
</script>
</body>
</html>
